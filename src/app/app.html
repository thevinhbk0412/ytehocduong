<div class="min-h-screen flex">
  <!-- Sidebar -->
  <aside 
    [class.w-64]="isSidebarOpen" 
    [class.w-20]="!isSidebarOpen"
    class="bg-slate-900 text-slate-400 transition-all duration-300 flex flex-col fixed h-full z-50 lg:relative"
  >
    <div class="p-6 flex items-center gap-3 overflow-hidden">
      <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center text-white shrink-0">
        <mat-icon>health_and_safety</mat-icon>
      </div>
      <span class="text-white font-display font-bold text-xl whitespace-nowrap" [class.hidden]="!isSidebarOpen">EduHealth</span>
    </div>

    <nav class="flex-1 px-4 space-y-6 mt-4 overflow-y-auto custom-scrollbar">
      @for (group of navGroups; track group.label) {
        <div class="space-y-1">
          <p 
            [class.opacity-0]="!isSidebarOpen"
            class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest transition-opacity duration-300"
          >
            {{ group.label }}
          </p>
          @for (item of group.items; track item.path) {
            <a 
              [routerLink]="item.path"
              routerLinkActive="bg-brand-600/10 text-brand-400 border-brand-600/20"
              [routerLinkActiveOptions]="{exact: true}"
              class="flex items-center gap-4 px-4 py-2.5 rounded-xl hover:bg-white/5 transition-all group border border-transparent whitespace-nowrap"
            >
              <mat-icon class="group-hover:text-white transition-colors shrink-0">{{ item.icon }}</mat-icon>
              <span [class.hidden]="!isSidebarOpen" class="font-medium text-sm">{{ item.label }}</span>
            </a>
          }
        </div>
      }
    </nav>

    <div class="p-4 border-t border-white/10">
      <button 
        (click)="toggleSidebar()"
        class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors text-slate-500"
      >
        <mat-icon>{{ isSidebarOpen ? 'chevron_left' : 'chevron_right' }}</mat-icon>
        <span [class.hidden]="!isSidebarOpen" class="text-sm">Thu gọn</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
    <!-- Header -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-40">
      <div class="flex items-center gap-4">
        <div class="hidden lg:block text-sm text-slate-500 font-medium">
          Hệ thống Y tế Học đường Toàn diện
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <button class="p-2 text-slate-400 hover:text-slate-600 relative">
          <mat-icon>notifications</mat-icon>
          <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
        <div class="h-8 w-px bg-slate-200 mx-2"></div>
        <div class="flex items-center gap-3">
          <div class="text-right hidden sm:block">
            <p class="text-sm font-bold text-slate-900">Cán bộ Y tế</p>
            <p class="text-xs text-slate-500">Trường Tiểu học ABC</p>
          </div>
          <div class="w-10 h-10 rounded-full bg-brand-100 text-brand-700 flex items-center justify-center font-bold">
            YT
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="p-8 max-w-7xl mx-auto w-full">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
